<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livora | الإعلانات</title>
    <link rel="stylesheet" href="adsstyle.css">
</head>
<body>

<header class="top-bar">
    <div class="logo">Livora</div>
    <input type="text" placeholder="بحث عن عقار..." class="search-input">
</header>

<section class="filters">
    <button>الكل</button>
    <button>شقق للإيجار</button>
    <button>فلل للبيع</button>
    <button>أراضي للبيع</button>
</section>

<section class="ads-list">

    <a href="ad-details.html" class="ad-card">
        <img src="https://images.unsplash.com/photo-1564013799919-ab600027ffc6" alt="">
        <div class="ad-info">
            <h3>شقة للإيجار في حي العارض - الرياض</h3>
            <p class="price">65,000 ريال / سنوي</p>
            <div class="specs">
                <span>🛏 5</span>
                <span>🛁 2</span>
                <span>📐 432م²</span>
            </div>
            <p class="location">حي العارض، الرياض</p>
        </div>
    </a>

    <a href="ad-details.html" class="ad-card">
        <img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688" alt="">
        <div class="ad-info">
            <h3>شقة للإيجار في حي النرجس</h3>
            <p class="price">70,000 ريال / سنوي</p>
            <div class="specs">
                <span>🛏 4</span>
                <span>🛁 2</span>
                <span>📐 97م²</span>
            </div>
            <p class="location">حي النرجس، الرياض</p>
        </div>
    </a>

</section>

</body>
</html>
