<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livora | Properties</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">Livora</div>
            <ul class="nav-links show">
                <li><a href="index.html">Home</a></li>
                <li><a href="listings.html">Properties</a></li>
            </ul>
        </nav>
    </header>

    <section class="search-section">
        <h2>Find Properties</h2>

        <div class="search-box">
            <input type="text" id="searchCity" placeholder="City">

            <select id="searchType">
                <option value="">All Types</option>
                <option>Apartment</option>
                <option>Villa</option>
                <option>Office</option>
            </select>

            <select id="searchPurpose">
                <option value="">Buy / Rent</option>
                <option>Buy</option>
                <option>Rent</option>
            </select>

            <button onclick="filterProperties()">Search</button>
        </div>
    </section>

    <section class="featured-properties">
        <h2>Available Properties</h2>
        <div class="property-grid" id="propertyContainer"></div>
    </section>

    <script src="js/listings.js"></script>
</body>
</html>
